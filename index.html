<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>元素探索博物館</title>
    <style>
        :root { --main-bg: #1a1a2e; --card-bg: #16213e; --accent: #4ecca3; }
        body { font-family: 'PingFang TC', sans-serif; background: var(--main-bg); color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { margin-bottom: 5px; color: var(--accent); }
        .subtitle { margin-bottom: 30px; opacity: 0.8; }
        
        /* 元素網格 */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; width: 100%; max-width: 800px; }
        .element-box { aspect-ratio: 1/1; background: var(--card-bg); border: 1px solid #0f3460; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; }
        .element-box:hover { transform: scale(1.1); border-color: var(--accent); box-shadow: 0 0 15px var(--accent); }
        .num { font-size: 10px; position: absolute; top: 5px; left: 5px; opacity: 0.6; }
        .sym { font-size: 24px; font-weight: bold; }
        .name-ch { font-size: 14px; margin-top: 2px; }

        /* 彈出資訊視窗 */
        #info-panel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 400px; background: white; color: #333; padding: 30px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); z-index: 100; text-align: center; }
        #info-panel h2 { font-size: 60px; margin: 0; color: var(--main-bg); }
        #info-panel .ch-name { font-size: 30px; font-weight: bold; margin-bottom: 10px; }
        #info-panel .story { font-size: 18px; line-height: 1.6; background: #f0f2f5; padding: 15px; border-radius: 10px; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 50; }
        .close-btn { margin-top: 20px; padding: 10px 20px; background: var(--main-bg); color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>🧪 元素博物館</h1>
    <p class="subtitle">點擊方塊，探索元素的秘密生活</p>

    <div class="grid" id="elementGrid"></div>

    <div class="overlay" id="overlay" onclick="closePanel()"></div>
    <div id="info-panel">
        <h2 id="p-sym">H</h2>
        <div class="ch-name" id="p-name">氫</div>
        <div class="story" id="p-story">我是全宇宙最多的元素！太陽就是靠我發光發熱的喔。</div>
        <button class="close-btn" onclick="closePanel()">我記住了</button>
    </div>

    <script>
        const elements = [
            { id: 1, sym: 'H', name: '氫', story: '我是宇宙第一名！太陽公公每天都在燃燒我來產生能量。' },
            { id: 2, sym: 'He', name: '氦', story: '吸了我聲音會變尖，派對氣球裡裝的就是我，我很安全。' },
            { id: 3, sym: 'Li', name: '鋰', story: '你的手機可以玩很久都靠我，我是電池裡的主角！' },
            { id: 6, sym: 'C', name: '碳', story: '我可以是黑黑的鉛筆芯，也可以是亮晶晶的鑽石，神奇吧？' },
            { id: 7, sym: 'N', name: '氮', story: '洋芋片包裝撐得大大的，裡面不是空氣，是保護食物的我！' },
            { id: 8, sym: 'O', name: '氧', story: '沒了我你只能活三分鐘。我就在你吸的每一口空氣裡。' },
            { id: 9, sym: 'F', name: '氟', story: '牙膏裡常看到我，我是保護牙齒不蛀牙的小尖兵。' },
            { id: 10, sym: 'Ne', name: '氖', story: '晚上的招牌閃亮亮，那就是我被電到後發出的漂亮光芒。' },
            { id: 11, sym: 'Na', name: '鈉', story: '我很愛玩水，碰到水會爆炸！但我跟氯結合後就變成食鹽。' },
            { id: 13, sym: 'Al', name: '鋁', story: '我很輕，鋁箔紙、易開罐都是我做的。' },
            { id: 26, sym: 'Fe', name: '鐵', story: '蓋房子需要我，你血液紅紅的顏色也是因為有我喔！' }
        ];

        const grid = document.getElementById('elementGrid');
        elements.forEach(el => {
            const box = document.createElement('div');
            box.className = 'element-box';
            box.innerHTML = `<div class="num">${el.id}</div><div class="sym">${el.sym}</div><div class="name-ch">${el.name}</div>`;
            box.onclick = () => showInfo(el);
            grid.appendChild(box);
        });

        function showInfo(el) {
            document.getElementById('p-sym').innerText = el.sym;
            document.getElementById('p-name').innerText = el.name;
            document.getElementById('p-story').innerText = el.story;
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('info-panel').style.display = 'block';
        }

        function closePanel() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('info-panel').style.display = 'none';
        }
    </script>
</body>
</html>
