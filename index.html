<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>元素情境大挑戰</title>
    <style>
        :root { --bg: #f4f7f6; --primary: #2c3e50; --success: #27ae60; --error: #e74c3c; }
        body { font-family: 'PingFang TC', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .game-container { background: white; width: 90%; max-width: 450px; padding: 30px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; }
        .progress { font-weight: bold; color: #888; margin-bottom: 10px; }
        .question-box { min-height: 120px; display: flex; align-items: center; justify-content: center; background: #f9f9f9; padding: 20px; border-radius: 15px; margin-bottom: 30px; border-left: 5px solid var(--primary); }
        .question-text { font-size: 1.2rem; line-height: 1.6; color: var(--primary); font-weight: 500; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .btn { padding: 25px; font-size: 1.8rem; font-weight: bold; border: 3px solid #eee; border-radius: 15px; cursor: pointer; background: white; transition: all 0.2s; }
        .btn:hover { border-color: var(--primary); background: #f0f4f8; }
        .btn.correct { background: var(--success) !important; color: white; border-color: var(--success); }
        .btn.wrong { background: var(--error) !important; color: white; border-color: var(--error); animation: shake 0.4s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        .score-box { margin-top: 20px; font-size: 1.1rem; color: #666; }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="progress">題目 <span id="current-idx">1</span> / <span id="total-idx">10</span></div>
        <div class="question-box">
            <div class="question-text" id="q-text">加載中...</div>
        </div>
        <div class="options">
            <button class="btn" id="btn-0" onclick="checkAnswer(0)">?</button>
            <button class="btn" id="btn-1" onclick="checkAnswer(1)">?</button>
        </div>
        <div class="score-box">目前得分：<span id="score">0</span></div>
    </div>

    <script>
        // 擴充題庫：前 20 號與常見元素
        const bank = [
            { q: "我是全宇宙最多的元素！太陽就是靠我發光發熱的喔。", a: "H", wrong: "He" },
            { q: "吸了我聲音會變尖，派對氣球裡裝的就是我，我很安全。", a: "He", wrong: "H" },
            { q: "你的手機可以玩很久都靠我，我是電池裡的主角！", a: "Li", wrong: "Al" },
            { q: "我可以是黑黑的鉛筆芯，也可以是亮晶晶的鑽石，神奇吧？", a: "C", wrong: "O" },
            { q: "洋芋片包裝撐得大大的，裡面不是空氣，是保護食物的我！", a: "N", wrong: "Cl" },
            { q: "沒了我你只能活三分鐘。我就在你吸的每一口空氣裡。", a: "O", wrong: "N" },
            { q: "牙膏裡常看到我，我是保護牙齒不蛀牙的小尖兵。", a: "F", wrong: "Cl" },
            { q: "我很愛玩水，碰到水會爆炸！但我跟氯結合後就變成食鹽。", a: "Na", wrong: "Mg" },
            { q: "我很輕，鋁箔紙、易開罐都是我做的。", a: "Al", wrong: "Fe" },
            { q: "蓋房子需要我，你血液紅紅的顏色也是因為有我喔！", a: "Fe", wrong: "Cu" }
        ];

        let currentQuestion = 0;
        let score = 0;
        let canClick = true;

        function loadQuestion() {
            canClick = true;
            const q = bank[currentQuestion];
            document.getElementById('q-text').innerText = q.q;
            document.getElementById('current-idx').innerText = currentQuestion + 1;
            document.getElementById('total-idx').innerText = bank.length;

            // 隨機分配左右按鈕
            const isSwapped = Math.random() > 0.5;
            const btn0 = document.getElementById('btn-0');
            const btn1 = document.getElementById('btn-1');
            
            btn0.className = 'btn';
            btn1.className = 'btn';
            
            if (isSwapped) {
                btn0.innerText = q.wrong; btn0.dataset.correct = "false";
                btn1.innerText = q.a; btn1.dataset.correct = "true";
            } else {
                btn0.innerText = q.a; btn0.dataset.correct = "true";
                btn1.innerText = q.wrong; btn1.dataset.correct = "false";
            }
        }

        function checkAnswer(btnIdx) {
            if (!canClick) return;
            const btn = document.getElementById('btn-' + btnIdx);
            const isCorrect = btn.dataset.correct === "true";

            if (isCorrect) {
                btn.classList.add('correct');
                score += 10;
                document.getElementById('score').innerText = score;
                canClick = false;
                setTimeout(() => {
                    currentQuestion++;
                    if (currentQuestion < bank.length) {
                        loadQuestion();
                    } else {
                        alert("挑戰結束！你的總分是：" + score);
                        currentQuestion = 0; score = 0;
                        document.getElementById('score').innerText = score;
                        loadQuestion();
                    }
                }, 1000);
            } else {
                btn.classList.add('wrong');
                canClick = false;
                setTimeout(() => {
                    btn.classList.remove('wrong');
                    canClick = true;
                }, 500);
            }
        }

        loadQuestion();
    </script>
</body>
</html>
