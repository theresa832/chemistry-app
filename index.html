<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>國中化學元素快速記憶卡</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card-container { perspective: 1000px; width: 300px; height: 400px; cursor: pointer; margin-top: 50px; }
        .card { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; box-shadow: 0 10px 20px rgba(0,0,0,0.2); border-radius: 20px; }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 20px; border: 5px solid white; }
        .card-front { background: #4a90e2; color: white; }
        .card-back { background: #ffffff; color: #333; transform: rotateY(180deg); }
        .symbol { font-size: 80px; font-weight: bold; }
        .number { position: absolute; top: 20px; left: 20px; font-size: 24px; opacity: 0.8; }
        .name { font-size: 48px; font-weight: bold; color: #2c3e50; }
        .hint { font-size: 24px; color: #e67e22; margin-top: 10px; }
        .img-icon { font-size: 60px; margin-bottom: 10px; }
        .controls { margin-top: 40px; display: flex; gap: 20px; }
        button { padding: 15px 30px; font-size: 18px; border: none; border-radius: 10px; cursor: pointer; background: #2c3e50; color: white; transition: 0.2s; }
        button:hover { background: #34495e; transform: scale(1.05); }
        p { color: #666; margin-top: 20px; }
    </style>
</head>
<body>

    <h1>🧪 元素記憶閃卡</h1>
    <p>點擊卡片翻面，下方切換下一個</p>

    <div class="card-container" onclick="flipCard()">
        <div class="card" id="card">
            <div class="card-face card-front">
                <div class="number" id="cardNum">1</div>
                <div class="symbol" id="cardSymbol">H</div>
                <div style="margin-top:20px;">點擊看答案</div>
            </div>
            <div class="card-face card-back">
                <div class="img-icon" id="cardImg">☀️</div>
                <div class="name" id="cardName">氫</div>
                <div class="hint" id="cardHint">太陽的燃料</div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button onclick="prevCard()">上一個</button>
        <button onclick="nextCard()">下一個</button>
        <button onclick="shuffleCards()">隨機抽測</button>
    </div>

    <script>
        const elements = [
            { id: 1, symbol: 'H', name: '氫', hint: '太陽的燃料', img: '☀️' },
            { id: 2, symbol: 'He', name: '氦', hint: '派對氣球', img: '🎈' },
            { id: 6, symbol: 'C', name: '碳', hint: '鑽石與鉛筆', img: '💎' },
            { id: 7, symbol: 'N', name: '氮', hint: '零食包裝充氣', img: '🍟' },
            { id: 8, symbol: 'O', name: '氧', hint: '呼吸生存', img: '🌬️' },
            { id: 10, symbol: 'Ne', name: '氖', hint: '霓虹燈廣告', img: '💡' },
            { id: 11, symbol: 'Na', name: '鈉', hint: '食鹽的主要成分', img: '🧂' },
            { id: 13, symbol: 'Al', name: '鋁', hint: '鋁箔紙、易開罐', img: '🥤' },
            { id: 26, symbol: 'Fe', name: '鐵', hint: '鋼鐵建築、血液', img: '🏗️' },
            { id: 29, symbol: 'Cu', name: '銅', hint: '電線、硬幣', img: '⚡' },
            { id: 79, symbol: 'Au', name: '金', hint: '昂貴的首飾', img: '💍' }
        ];

        let currentIndex = 0;
        const card = document.getElementById('card');

        function updateCard() {
            card.classList.remove('is-flipped');
            setTimeout(() => {
                const el = elements[currentIndex];
                document.getElementById('cardNum').innerText = el.id;
                document.getElementById('cardSymbol').innerText = el.symbol;
                document.getElementById('cardName').innerText = el.name;
                document.getElementById('cardHint').innerText = el.hint;
                document.getElementById('cardImg').innerText = el.img;
            }, 150);
        }

        function flipCard() { card.classList.toggle('is-flipped'); }
        function nextCard() { currentIndex = (currentIndex + 1) % elements.length; updateCard(); }
        function prevCard() { currentIndex = (currentIndex - 1 + elements.length) % elements.length; updateCard(); }
        function shuffleCards() { elements.sort(() => Math.random() - 0.5); currentIndex = 0; updateCard(); }

        updateCard();
    </script>
</body>
</html>
